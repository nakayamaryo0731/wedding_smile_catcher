name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # TODO: Add backend/frontend tests when implemented
  # test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Run tests
  #       run: make test

  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Uncomment when test job is added
    # needs: test
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: ./.github/actions/terraform-setup
        with:
          gcp_credentials: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Validate
        run: terraform validate

      # NOTE: data_retention_days is pinned here so an accidental change to
      # the variables.tf default cannot silently shorten image retention.
      # See incident: kceDPRaWTSYnY8m5W3UZ images deleted under default=3.
      - name: Terraform Plan
        run: >
          terraform plan -no-color -input=false
          -var="current_event_id=${{ secrets.CURRENT_EVENT_ID }}"
          -var="admin_line_user_id=${{ secrets.ADMIN_LINE_USER_ID }}"
          -var="admin_email=${{ secrets.ADMIN_EMAIL }}"
          -var="smtp_email=${{ secrets.SMTP_EMAIL }}"
          -var="data_retention_days=30"

      - name: Terraform Apply
        run: >
          terraform apply -auto-approve -input=false
          -var="current_event_id=${{ secrets.CURRENT_EVENT_ID }}"
          -var="admin_line_user_id=${{ secrets.ADMIN_LINE_USER_ID }}"
          -var="admin_email=${{ secrets.ADMIN_EMAIL }}"
          -var="smtp_email=${{ secrets.SMTP_EMAIL }}"
          -var="data_retention_days=30"
